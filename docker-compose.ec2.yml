services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p\"$${MYSQL_ROOT_PASSWORD}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped

  identity-service:
    build:
      context: ./backend
      dockerfile: identity-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/identity_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy

  catalog-service:
    build:
      context: ./backend
      dockerfile: catalog-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/catalog_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CATALOG_CACHE_TTL: 5m
      APP_UPLOAD_DIR: /app/uploads
      PAYMENT_INTERNAL_TOKEN: ${PAYMENT_INTERNAL_TOKEN}
      ORDER_SERVICE_URL: http://order-service:8094
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - catalog-uploads:/app/uploads

  order-service:
    build:
      context: ./backend
      dockerfile: order-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      CATALOG_SERVICE_URL: http://catalog-service:8093
      PAYMENT_INTERNAL_TOKEN: ${PAYMENT_INTERNAL_TOKEN}
    depends_on:
      mysql:
        condition: service_healthy
      catalog-service:
        condition: service_started

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/payment_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ORDER_SERVICE_URL: http://order-service:8094
      PAYMENT_INTERNAL_TOKEN: ${PAYMENT_INTERNAL_TOKEN}
    depends_on:
      mysql:
        condition: service_healthy
      order-service:
        condition: service_started

  analytics-service:
    build:
      context: ./backend
      dockerfile: analytics-service/Dockerfile
    restart: unless-stopped
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8093
      ORDER_SERVICE_URL: http://order-service:8094
    depends_on:
      catalog-service:
        condition: service_started
      order-service:
        condition: service_started

  chat-service:
    build:
      context: ./backend
      dockerfile: chat-service/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chat_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CHAT_ALLOWED_ORIGINS: ${PUBLIC_WEB_ORIGIN}
    depends_on:
      mysql:
        condition: service_healthy

  assistant-service:
    build:
      context: ./backend
      dockerfile: assistant-service/Dockerfile
    restart: unless-stopped
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8093
      LLM_API_BASE_URL: ${LLM_API_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-flash}
      ASSISTANT_MAX_CANDIDATES: 20
      ASSISTANT_TIMEOUT_SECONDS: 30
    depends_on:
      - catalog-service

  gateway-service:
    build:
      context: ./backend
      dockerfile: gateway-service/Dockerfile
    restart: unless-stopped
    environment:
      IDENTITY_SERVICE_URL: http://identity-service:8092
      CATALOG_SERVICE_URL: http://catalog-service:8093
      ORDER_SERVICE_URL: http://order-service:8094
      PAYMENT_SERVICE_URL: http://payment-service:8098
      CHAT_SERVICE_URL: http://chat-service:8096
      ANALYTICS_SERVICE_URL: http://analytics-service:8095
      ASSISTANT_SERVICE_URL: http://assistant-service:8097
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_WEB_ORIGIN}
    depends_on:
      - identity-service
      - catalog-service
      - order-service
      - payment-service
      - chat-service
      - analytics-service
      - assistant-service

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - gateway-service
      - payment-service
      - chat-service
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  mysql-data:
  catalog-uploads:
