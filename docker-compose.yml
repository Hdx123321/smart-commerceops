services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-commerceops}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pcommerceops"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  identity-service:
    build:
      context: ./backend
      dockerfile: identity-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/identity_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-commerceops}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8092:8092"

  catalog-service:
    build:
      context: ./backend
      dockerfile: catalog-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/catalog_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-commerceops}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CATALOG_CACHE_TTL: 5m
      APP_UPLOAD_DIR: /app/uploads
      PAYMENT_INTERNAL_TOKEN: ${PAYMENT_INTERNAL_TOKEN:-dev-internal-payment-token}
      ORDER_SERVICE_URL: http://order-service:8094
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8093:8093"
    volumes:
      - catalog-uploads:/app/uploads

  order-service:
    build:
      context: ./backend
      dockerfile: order-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-commerceops}
      CATALOG_SERVICE_URL: http://catalog-service:8093
      PAYMENT_INTERNAL_TOKEN: ${PAYMENT_INTERNAL_TOKEN:-dev-internal-payment-token}
    depends_on:
      mysql:
        condition: service_healthy
      catalog-service:
        condition: service_started
    ports:
      - "8094:8094"

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/payment_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-commerceops}
      ORDER_SERVICE_URL: http://order-service:8094
      PAYMENT_INTERNAL_TOKEN: ${PAYMENT_INTERNAL_TOKEN:-dev-internal-payment-token}
    depends_on:
      mysql:
        condition: service_healthy
      order-service:
        condition: service_started
    ports:
      - "8098:8098"

  analytics-service:
    build:
      context: ./backend
      dockerfile: analytics-service/Dockerfile
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8093
      ORDER_SERVICE_URL: http://order-service:8094
    depends_on:
      catalog-service:
        condition: service_started
      order-service:
        condition: service_started
    ports:
      - "8095:8095"

  chat-service:
    build:
      context: ./backend
      dockerfile: chat-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chat_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-commerceops}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CHAT_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8096:8096"

  assistant-service:
    build:
      context: ./backend
      dockerfile: assistant-service/Dockerfile
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8093
      LLM_API_BASE_URL: ${LLM_API_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-flash}
      ASSISTANT_MAX_CANDIDATES: 20
      ASSISTANT_TIMEOUT_SECONDS: 30
    depends_on:
      - catalog-service
    ports:
      - "8097:8097"

  gateway-service:
    build:
      context: ./backend
      dockerfile: gateway-service/Dockerfile
    environment:
      IDENTITY_SERVICE_URL: http://identity-service:8092
      CATALOG_SERVICE_URL: http://catalog-service:8093
      ORDER_SERVICE_URL: http://order-service:8094
      PAYMENT_SERVICE_URL: http://payment-service:8098
      CHAT_SERVICE_URL: http://chat-service:8096
      ANALYTICS_SERVICE_URL: http://analytics-service:8095
      ASSISTANT_SERVICE_URL: http://assistant-service:8097
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      - identity-service
      - catalog-service
      - order-service
      - payment-service
      - chat-service
      - analytics-service
      - assistant-service
    ports:
      - "8090:8090"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8090
    depends_on:
      - gateway-service
      - payment-service
      - chat-service
    ports:
      - "3000:80"

  prometheus:
    image: prom/prometheus:v3.0.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  mysql-data:
  grafana-data:
  catalog-uploads:
