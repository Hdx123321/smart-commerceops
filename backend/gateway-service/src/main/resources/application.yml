server:
  port: ${PORT:8090}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
          - id: identity
            uri: ${IDENTITY_SERVICE_URL:http://localhost:8092}
            predicates:
              - Path=/auth/**
          - id: catalog-public
            uri: ${CATALOG_SERVICE_URL:http://localhost:8093}
            predicates:
              - Path=/products/**
          - id: catalog-admin
            uri: ${CATALOG_SERVICE_URL:http://localhost:8093}
            predicates:
              - Path=/admin/products/**,/admin/inventory/**,/admin/upload,/admin/upload/**
          - id: catalog-images
            uri: ${CATALOG_SERVICE_URL:http://localhost:8093}
            predicates:
              - Path=/images/**
          - id: orders
            uri: ${ORDER_SERVICE_URL:http://localhost:8094}
            predicates:
              - Path=/cart/**,/checkout,/orders/**,/after-sales/**
          - id: payments
            uri: ${PAYMENT_SERVICE_URL:http://localhost:8098}
            predicates:
              - Path=/payments,/payments/**
          - id: chat
            uri: ${CHAT_SERVICE_URL:http://localhost:8096}
            predicates:
              - Path=/chat/**
          - id: analytics
            uri: ${ANALYTICS_SERVICE_URL:http://localhost:8095}
            predicates:
              - Path=/analytics/**
          - id: assistant
            uri: ${ASSISTANT_SERVICE_URL:http://localhost:8097}
            predicates:
              - Path=/assistant/**
        globalcors:
          cors-configurations:
            '[/**]':
              allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
              allowed-methods: "*"
              allowed-headers: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me}
