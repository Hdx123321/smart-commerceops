server:
  port: ${PORT:8090}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      mvc:
        routes:
          - id: identity
            uri: ${IDENTITY_SERVICE_URL:http://localhost:8092}
            predicates:
              - Path=/auth/**
          - id: catalog-public
            uri: ${CATALOG_SERVICE_URL:http://localhost:8093}
            predicates:
              - Path=/products/**
          - id: catalog-admin
            uri: ${CATALOG_SERVICE_URL:http://localhost:8093}
            predicates:
              - Path=/admin/products/**,/admin/inventory/**,/admin/upload,/admin/upload/**
          - id: catalog-images
            uri: ${CATALOG_SERVICE_URL:http://localhost:8093}
            predicates:
              - Path=/images/**
          - id: orders
            uri: ${ORDER_SERVICE_URL:http://localhost:8094}
            predicates:
              - Path=/cart/**,/checkout,/orders/**
          - id: analytics
            uri: ${ANALYTICS_SERVICE_URL:http://localhost:8095}
            predicates:
              - Path=/analytics/**
        globalcors:
          cors-configurations:
            '[/**]':
              allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
              allowed-methods: "*"
              allowed-headers: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
