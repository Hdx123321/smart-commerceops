server:
  port: ${PORT:8093}

spring:
  application:
    name: catalog-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:catalog;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

app:
  internal-token: ${PAYMENT_INTERNAL_TOKEN:dev-internal-payment-token}
  upload:
    dir: ${APP_UPLOAD_DIR:./uploads}
  cache:
    catalog:
      ttl: ${CATALOG_CACHE_TTL:5m}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
