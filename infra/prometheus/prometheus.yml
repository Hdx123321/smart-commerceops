global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway-service:8090"]
  - job_name: identity-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["identity-service:8092"]
  - job_name: catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["catalog-service:8093"]
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["order-service:8094"]
  - job_name: analytics-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["analytics-service:8095"]
